name: CI Workflow
on: [push]
jobs:
  build:
    name: Hello World
    runs-on: ubuntu-latest
    permissions:
        contents: read
        packages: write
    steps:
      - uses: actions/checkout@v6
        name: Checkout code
      - run: echo "Hello world"
        name: Echo greeting 
      - run: ls -la
        name: List files
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
            distribution: 'temurin'
            java-version: '21'
      - name: Grant execute permission for gradlew
        run: | 
            chmod +x gradlew
            ./gradlew build
            ./gradlew bootJar
      - name: Build Docker image
        run: |
            docker build -t ghcr.io/victorj19/cloudcamp-cicd .
      - name: Login to Image Regestry
        uses: docker/login-action@v3
        with:
            registry: ghcr.io
            username: ${{ github.actor }}
      - name: Push Docker image
        run: |
            docker push ghcr.io/victorj19/cloudcamp-cicd
                
